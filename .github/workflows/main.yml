name: Demo Github Actions CI/CD 

# ===== ĐIỀU KIỆN KÍCH HOẠT (EVENTS) =====
on: 
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

# ===== CÔNG VIỆC (JOBS) =====
jobs:
    # ---------------------------------------------------
    # JOB 1: KỊCH BẢN 1 - CI PIPELINE CƠ BẢN
    # ---------------------------------------------------
    ci-test-job:
        name: CI Test Job
        runs-on: ubuntu-latest
        steps:
            - name: 1. Lấy mã nguồn (Checkout)
              uses: actions/checkout@v4

            - name: 2. Thiết lập Python 3.10
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
                cache: 'pip' # Tự động cache các thư viện để chạy nhanh hơn

            - name: 3. Cài đặt thư viện phụ thuộc
              run: |
                python -m pip install --upgrade pip
                if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: 4. Kiểm tra chuẩn Code (Linting với flake8)
              run: |
                # Kiểm tra lỗi cú pháp và các lỗi nghiêm trọng
                flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

            - name: 5. Chạy Unit Test và Đo độ bao phủ
              run: |
                pytest tests/test_calculator.py --junitxml=junit/test-results.xml --cov=src --cov-report=xml
              env:
                PYTHONPATH: . # Đảm bảo pytest có thể tìm thấy module src

            - name: 6. Tải báo cáo Test lên (Artifacts)
              if: always() # Luôn chạy kể cả khi test fail để xem lỗi
              uses: actions/upload-artifact@v4
              with:
                name: test-reports
                path: |
                    junit/test-results.xml
                    htmlcov/
    
    # ---------------------------------------------------
    # JOB 2: KỊCH BẢN 2 - ĐÓNG GÓI SẢN PHẨM (CD)
    # ---------------------------------------------------
    cd-build-artifact:
        # Tắt tạm thời ràng buộc phụ thuộc job 1
        needs: ci-test-job
        name: CD Build Artifact
        runs-on: ubuntu-latest
        # TẠM TẮT RÀNG BUỘC CHỈ CHẠY TRÊN MAIN
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: 1. Lấy mã nguồn
              uses: actions/checkout@v4

            - name: 2. Nén mã nguồn thành file Zip (Artifact)
              run: |
                zip -r calculator.zip src/
            
            - name: 3. Tải sản phẩm lên GitHub Actions Artifact
              uses: actions/upload-artifact@v4
              with:
                name: calculator-artifact
                path: calculator.zip

